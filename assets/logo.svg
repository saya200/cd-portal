<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" fill="none">
  <!-- درع الدفاع المدني – شعار مؤقت، استبدله بالشعار الرسمي -->
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#155549"/>
      <stop offset="100%" stop-color="#2a8f77"/>
    </linearGradient>
  </defs>

  <!-- الدرع -->
  <path d="M60 6L10 28v32c0 32 22 61 50 72 28-11 50-40 50-72V28L60 6z"
        fill="url(#shieldGrad)" stroke="#3db88a" stroke-width="2"/>

  <!-- إطار داخلي -->
  <path d="M60 18L20 36v26c0 26 18 49 40 58 22-9 40-32 40-58V36L60 18z"
        fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- لهب الحريق -->
  <path d="M60 45 C56 52 50 56 52 64 C54 72 60 74 60 74
           C60 74 66 72 68 64 C70 56 64 52 60 45Z"
        fill="white" opacity="0.92"/>
  <path d="M60 55 C58 60 55 62 56 67 C57 72 60 73 60 73
           C60 73 63 72 64 67 C65 62 62 60 60 55Z"
        fill="#3db88a" opacity="0.8"/>

  <!-- نجمة الحياة المبسطة -->
  <line x1="60" y1="82" x2="60" y2="102" stroke="white" stroke-width="3.5"
        stroke-linecap="round" opacity="0.85"/>
  <line x1="50" y1="92" x2="70" y2="92" stroke="white" stroke-width="3.5"
        stroke-linecap="round" opacity="0.85"/>
  <line x1="53" y1="84" x2="67" y2="100" stroke="white" stroke-width="3.5"
        stroke-linecap="round" opacity="0.85"/>
  <line x1="67" y1="84" x2="53" y2="100" stroke="white" stroke-width="3.5"
        stroke-linecap="round" opacity="0.85"/>

  <!-- نص -->
  <text x="60" y="128" text-anchor="middle" font-family="Tahoma,Arial"
        font-size="11" font-weight="bold" fill="white" opacity="0.9"
        letter-spacing="1.5">الدفاع المدني</text>
</svg>
